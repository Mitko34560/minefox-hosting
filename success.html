<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success - MineFox Hosting</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><span class="logo-text"><span class="logo-mine">MINE</span><span class="logo-fox">FOX</span></span></a>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="pricing.html" class="nav-link">Pricing</a></li>
            </ul>
        </div>
    </nav>

    <div class="payment-container">
        <div class="payment-content" style="grid-template-columns: 1fr; max-width: 600px;">
            <div class="payment-card">
                <div class="payment-header" style="text-align: center;">
                    <div style="font-size: 4rem; color: #4CAF50; margin-bottom: 1rem;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h1>Payment Successful!</h1>
                    <p>Your plan is now active</p>
                </div>

                <div class="payment-status-info" style="margin-top: 2rem;">
                    <p><strong>✓ Payment Reference:</strong></p>
                    <p id="reference" style="font-family: monospace; word-break: break-all;"></p>
                </div>

                <div class="alert alert-info" style="margin-top: 2rem;">
                    <i class="fas fa-check"></i>
                    <div>
                        <p><strong>✓ Plan Activated</strong></p>
                        <p>Your plan is now active and you have full access to your servers immediately!</p>
                    </div>
                </div>

                <div style="margin-top: 2rem; text-align: center;">
                    <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2024 MineFox Hosting. All rights reserved.</p></footer>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        function getUrlParameter(name) {
            const url = new URLSearchParams(window.location.search);
            return url.get(name);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            const reference = getUrlParameter('reference');
            if (reference) {
                document.getElementById('reference').textContent = reference;
            }
        });
    </script>
</body>
</html>
