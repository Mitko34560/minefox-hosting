<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MineFox Hosting</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><span class="logo-text"><span class="logo-mine">MINE</span><span class="logo-fox">FOX</span></span></a>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="pricing.html" class="nav-link">Pricing</a></li>
                <li><a href="#" onclick="logout(); location.href='login.html'; return false;" class="nav-link btn-nav">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="payment-container">
        <div class="payment-content">
            <div class="payment-left">
                <div class="payment-card">
                    <div class="payment-header">
                        <h1>Secure Checkout</h1>
                        <p id="planNameText"></p>
                    </div>

                    <div id="alert"></div>

                    <form class="payment-form" onsubmit="handleStripePayment(event)" id="paymentForm">
                        <div id="card-element"></div>
                        <div id="card-errors" role="alert"></div>

                        <button type="submit" class="btn btn-primary btn-block" id="submitBtn" style="margin-top: 20px;"></button>
                    </form>

                    <p class="payment-note"><i class="fas fa-lock"></i> Your payment is secure and encrypted with Stripe</p>
                </div>
            </div>

            <div class="payment-right">
                <div class="payment-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-item">
                        <span id="summaryPlanName"></span>
                        <span id="summaryPrice"></span>
                    </div>
                    <div class="summary-item">
                        <span>Billing Period</span>
                        <span>1 Month</span>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="summaryTotal"></span>
                    </div>

                    <div class="plan-specs" id="planSpecs"></div>

                    <div class="payment-status-info">
                        <p><strong>✓ Instant Activation</strong></p>
                        <p>Your plan will be activated immediately after successful payment.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-bottom"><p>&copy; 2024 MineFox Hosting. All rights reserved.</p></footer>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        let stripe, elements, cardElement;

        function getUrlParameter(name) {
            const url = new URLSearchParams(window.location.search);
            return url.get(name);
        }

        function initializeCheckout() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const planKey = getUrlParameter('plan');
            if (!planKey || !PLANS[planKey]) {
                window.location.href = 'pricing.html';
                return;
            }

            const plan = PLANS[planKey];
            const price = plan.price.toFixed(2);

            // Update text
            document.getElementById('planNameText').textContent = `Secure payment for ${plan.name} plan`;
            document.getElementById('summaryPlanName').textContent = `${plan.name} Plan`;
            document.getElementById('summaryPrice').textContent = `€${price}`;
            document.getElementById('summaryTotal').textContent = `€${price}`;
            document.getElementById('submitBtn').textContent = `Pay €${price} with Stripe`;

            // Update plan specs
            let specsHTML = '<h4>Plan Includes:</h4><ul>';
            specsHTML += `<li>${plan.ram} GB RAM</li>`;
            specsHTML += `<li>${plan.cpu} CPU Cores</li>`;
            specsHTML += `<li>${plan.storage} GB Storage</li>`;
            specsHTML += `<li>${plan.slots} Player Slots</li>`;
            specsHTML += '<li>DDoS Protection</li>';
            specsHTML += '<li>99.9% Uptime SLA</li>';
            specsHTML += '<li>24/7 Support</li>';
            specsHTML += '</ul>';
            document.getElementById('planSpecs').innerHTML = specsHTML;

            // Store plan key for submission
            window.currentPlan = planKey;

            // Initialize Stripe (use public key)
            stripe = Stripe(STRIPE_PUBLIC_KEY);
            elements = stripe.elements();
            cardElement = elements.create('card');
            cardElement.mount('#card-element');

            // Handle real-time validation errors
            cardElement.on('change', function(event) {
                const displayError = document.getElementById('card-errors');
                if (event.error) {
                    displayError.textContent = event.error.message;
                } else {
                    displayError.textContent = '';
                }
            });
        }

        function handleStripePayment(event) {
            event.preventDefault();

            const user = getCurrentUser();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;

            // For GitHub Pages demo: Use mock payment
            // In production: Use real Stripe API
            
            if (STRIPE_PUBLIC_KEY === 'pk_test_demo') {
                // Demo mode - simulate Stripe payment
                const paymentIntentId = 'pi_demo_' + Date.now() + '_' + Math.random().toString(36).substring(7);
                const result = processStripePayment(window.currentPlan, paymentIntentId);
                
                if (result.success) {
                    showAlert('success', '✓ Payment successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'success.html?reference=' + result.reference;
                    }, 1500);
                } else {
                    showAlert('error', result.message);
                    submitBtn.disabled = false;
                }
            } else {
                // Production mode - Use real Stripe
                stripe.confirmCardPayment(/* secret from server */, {
                    payment_method: {
                        card: cardElement,
                        billing_details: {
                            name: user.username,
                            email: user.email
                        }
                    }
                }).then(function(result) {
                    if (result.error) {
                        showAlert('error', result.error.message);
                        submitBtn.disabled = false;
                    } else {
                        // Payment successful
                        const paymentResult = processStripePayment(
                            window.currentPlan,
                            result.paymentIntent.id
                        );
                        
                        if (paymentResult.success) {
                            window.location.href = 'success.html?reference=' + paymentResult.reference;
                        } else {
                            showAlert('error', paymentResult.message);
                            submitBtn.disabled = false;
                        }
                    }
                });
            }
        }

        function showAlert(type, message) {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}</div>`;
        }

        document.addEventListener('DOMContentLoaded', initializeCheckout);
    </script>
</body>
</html>
